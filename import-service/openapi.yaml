openapi: "3.0.1"
info:
  title: "Import"
  version: "2023-12-17T17:14:02Z"
servers:
- url: "https://8rk4roadt1.execute-api.eu-central-1.amazonaws.com/{basePath}"
  variables:
    basePath:
      default: "dev"
paths:
  /import:
    get:
      parameters:
      - name: "name"
        in: "query"
        required: true
        schema:
          type: "string"
      - name: "Authorization"
        in: "header"
        required: true
        schema:
          type: "string"
      responses:
        "400":
          description: "400 response"
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: "string"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportProductsErrorModel"
        "500":
          description: "500 response"
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: "string"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportProductsErrorModel"
        "200":
          description: "200 response"
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: "string"
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/RequestImportProductsModel"
      security:
      - ImportServiceImportServiceApiTokenAuthorizer5158D956: []
    options:
      responses:
        "204":
          description: "204 response"
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: "string"
            Access-Control-Allow-Methods:
              schema:
                type: "string"
            Access-Control-Allow-Headers:
              schema:
                type: "string"
          content: {}
components:
  schemas:
    ImportProductsErrorModel:
      title: "Error"
      required:
      - "message"
      type: "object"
      properties:
        message:
          type: "string"
    RequestImportProductsModel:
      title: "SignedUrl"
      type: "string"
  securitySchemes:
    ImportServiceImportServiceApiTokenAuthorizer5158D956:
      type: "apiKey"
      name: "Authorization"
      in: "header"
      x-amazon-apigateway-authtype: "custom"
