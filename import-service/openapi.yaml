openapi: "3.0.1"
info:
  title: "Import"
  version: "2023-12-01T06:43:41Z"
servers:
- url: "https://a7d4tysbfj.execute-api.eu-central-1.amazonaws.com/{basePath}"
  variables:
    basePath:
      default: "dev"
paths:
  /import:
    get:
      parameters:
      - name: "name"
        in: "query"
        required: true
        schema:
          type: "string"
      responses:
        "202":
          description: "202 response"
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/RequestImportProductsModel"
        "400":
          description: "400 response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportProductsErrorModel"
        "500":
          description: "500 response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportProductsErrorModel"
components:
  schemas:
    ImportProductsErrorModel:
      title: "Error"
      required:
      - "message"
      type: "object"
      properties:
        message:
          type: "string"
    RequestImportProductsModel:
      title: "SignedUrl"
      type: "string"
