openapi: "3.0.1"
info:
  title: "Products"
  version: "2023-11-19T21:13:15Z"
servers:
- url: "https://dw0r0hgmic.execute-api.eu-central-1.amazonaws.com/{basePath}"
  variables:
    basePath:
      default: "dev"
paths:
  /products/{id}:
    get:
      parameters:
      - name: "id"
        in: "path"
        required: true
        schema:
          type: "string"
      responses:
        "400":
          description: "400 response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OneProductInvalidIdModel"
        "404":
          description: "404 response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OneProductInvalidIdModel"
        "200":
          description: "200 response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OneProductModel"
  /products:
    get:
      responses:
        "200":
          description: "200 response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AllProductsModel"
components:
  schemas:
    OneProductInvalidIdModel:
      title: "Error"
      required:
      - "errorCode"
      - "message"
      type: "object"
      properties:
        errorCode:
          type: "integer"
        message:
          type: "string"
    OneProductModel:
      title: "Product"
      required:
      - "description"
      - "id"
      - "price"
      - "title"
      type: "object"
      properties:
        price:
          type: "integer"
        description:
          type: "string"
        id:
          type: "string"
        title:
          type: "string"
    AllProductsModel:
      title: "Products"
      type: "array"
      items:
        $ref: "#/components/schemas/OneProductModel"
